# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColorGreen = rgb(1A237E)
$activeBorderColorDark = rgb(1A237E)

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 0
}

decoration {
    rounding = 10

    blur {
        enabled = true
        size = 4
        passes = 3
        new_optimizations = on
    }

    shadow {
        enabled = true
        range = 12
        render_power = 4
        color = rgba(0, 0, 0, 0.15)
        offset = 1 1
    }

    active_opacity = 0.98
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0
}

animations {
  enabled = yes

  bezier = neon,    0.4,  0.0,  0.2,  1.0
  bezier = adna,  0.55, 0.02, 0.38, 0.98
  bezier = fogbank, 0.70, 0.01, 0.30, 1.00
  bezier = toxic,   0.85, 0.00, 0.25,  1.00

  animation = windows,     1, 3, adna
  animation = windowsIn,   1, 3, adna, slide
  animation = windowsOut,  1, 2, adna, slide
  animation = windowsMove, 1,  2, adna
  animation = fade,        1, 4, fogbank
  animation = fadeIn,      1, 3, fogbank
  animation = fadeOut,     1, 2, fogbank
  animation = workspaces, 1, 4, fogbank, slidevert
  animation = borderangle, 1, 60, linear, loop
  animation = layers, 1, 3, adna, slide
  animation = layersIn, 1, 3, adna, slide
  animation = layersOut, 1, 2, adna, slide
}

layerrule = ignore_alpha 0, match:namespace walker
layerrule = blur on, match:namespace walker
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications
layerrule = animation slide, match:namespace notifications
layerrule = blur on, match:namespace vicinae
layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace vicinae
